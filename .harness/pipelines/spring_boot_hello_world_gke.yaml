pipeline:
  name: Spring Boot Hello World
  identifier: spring_boot_hello_world_gke
  projectIdentifier: soto_sandbox
  orgIdentifier: sandbox
  tags: {}
  variables:
    - name: IMAGE_TAG
      type: String
      description: Image tag used for build + deploy
      value: <+codebase.shortCommitSha>
  properties:
    ci:
      codebase:
        connectorRef: alexsotoharness
        repoName: spring-boot-hello-world
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Build and Push
        identifier: build_and_push
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Maven Package
                  identifier: maven_package
                  type: Run
                  spec:
                    shell: Sh
                    command: mvn -B -DskipTests clean package
              - step:
                  name: Build and Push Image
                  identifier: build_and_push_image
                  type: BuildAndPushDockerRegistry
                  spec:
                    connectorRef: dockerhubalexsotoharness
                    repo: alexsotoharness/spring-boot-hello-world
                    tags:
                      - <+pipeline.variables.IMAGE_TAG>
              - stepGroup:
                  name: SCS
                  identifier: SCS
                  steps:
                    - step:
                        type: SscaArtifactSigning
                        name: Artifact Signing
                        identifier: Artifact_Signing
                        spec:
                          source:
                            type: docker
                            spec:
                              connector: dockerhubalexsotoharness
                              image: alexsotoharness/spring-boot-hello-world:<+pipeline.variables.IMAGE_TAG>
                          signing:
                            type: keyless
                            spec:
                              oidcProvider: harness
                          uploadSignature:
                            upload: true
                          resources:
                            limits:
                              memory: 500Mi
                              cpu: "0.5"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure

    - stage:
        name: Deploy to Dev GKE
        identifier: deploy_to_dev_gke
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: spring_boot_hello_world
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: dockerhub
                      sources:
                        - identifier: dockerhub
                          type: DockerRegistry
                          spec:
                            connectorRef: dockerhubalexsotoharness
                            imagePath: alexsotoharness/spring-boot-hello-world
                            tag: <+pipeline.variables.IMAGE_TAG>
          environment:
            environmentRef: Dev
            deployToAll: false
            infrastructureDefinitions:
              - identifier: gke_sandbox_dev
          execution:
            steps:
              - stepGroup:
                  name: SCS
                  identifier: SCS
                  steps:
                    - step:
                        type: SscaArtifactVerification
                        name: Artifact Verification
                        identifier: Artifact_Verification
                        spec:
                          source:
                            type: docker
                            spec:
                              connector: dockerhubalexsotoharness
                              image: alexsotoharness/spring-boot-hello-world:<+pipeline.variables.IMAGE_TAG>
                          verifySign:
                            type: keyless
                            spec:
                              oidcProvider: harness
                          resources:
                            limits:
                              memory: 500Mi
                              cpu: "0.5"
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: gkesandbox
              - step:
                  name: Rolling Deploy
                  identifier: rolling_deploy
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
